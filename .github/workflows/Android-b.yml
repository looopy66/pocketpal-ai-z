name: Build Android APK (HF Mirror)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # 支持手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # 让任何走 huggingface_hub / CLI 的请求都走国内镜像
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_ENABLE_HF_TRANSFER: '1'
      # Gradle / JVM 走镜像也能加速（如需要可再加）
      GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.caching=true'

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 JDK 17（React Native 0.74+ 要求 JDK 17）
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装 Node 22（package.json engines 要求 >=22.21.0）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 4. 安装 Yarn 1.22.22（与 packageManager 字段一致）
      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      # 5. 配置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      # 6. 关键：把源码中的 huggingface.co 替换为 hf-mirror.com
      - name: Replace HuggingFace endpoint with hf-mirror.com
        run: |
          set -e
          echo "替换前引用情况："
          grep -rn "huggingface.co" src/ android/ || true
          # 仅替换字面量域名，不动其他内容
          find src android -type f \
            \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.java' -o -name '*.kt' -o -name '*.gradle' -o -name '*.xml' \) \
            -print0 | xargs -0 sed -i 's|huggingface\.co|hf-mirror.com|g'
          echo "替换后引用情况："
          grep -rn "hf-mirror.com" src/ android/ | head -50

      # 7. （可选）准备 .env 文件，react-native-config 在 release 构建时会读取
      - name: Prepare .env
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          # 注入 HF 镜像端点，供 react-native-config 编译期使用
          echo "HF_ENDPOINT=https://hf-mirror.com" >> .env

      # 8. 安装 JS 依赖（会触发 postinstall: ./scripts/postinstall.sh）
      - name: Install dependencies
        run: yarn install --immutable

      # 9. 给 gradlew 执行权限
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # 10. 构建 Release APK（项目使用 productFlavors: prod）
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleProdRelease --no-daemon --stacktrace

      # 11. 上传产物
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketpal-ai-apk
          path: android/app/build/outputs/apk/prodRelease/*.apk
          if-no-files-found: error
          retention-days: 30

      # 12. 如果是 tag 推送，则发布到 GitHub Release
      - name: Release APK on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/prodRelease/*.apk
          generate_release_notes: true

