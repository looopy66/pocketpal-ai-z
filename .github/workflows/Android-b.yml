name: Test Runner Max Performance

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ==========================================
  # 第一阶段：快速探测可用的最高性能 Runner
  # ==========================================
  probe-16:
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 5
    steps:
      - run: echo "16-core runner is available"

  probe-8:
    runs-on: ubuntu-latest-8-cores
    needs: probe-16
    if: failure() # 只有 16 核不可用时才尝试 8 核
    timeout-minutes: 5
    steps:
      - run: echo "8-core runner is available"

  probe-4:
    runs-on: ubuntu-latest-4-cores
    needs: probe-8
    if: failure()
    timeout-minutes: 5
    steps:
      - run: echo "4-core runner is available"

  determine-runner:
    runs-on: ubuntu-latest
    needs: [probe-16, probe-8, probe-4]
    if: always()
    outputs:
      runner: ${{ steps.set-runner.outputs.runner }}
      cores: ${{ steps.set-runner.outputs.cores }}
    steps:
      - id: set-runner
        run: |
          if [ "${{ needs.probe-16.result }}" == "success" ]; then
            echo "runner=ubuntu-latest-16-cores" >> $GITHUB_OUTPUT
            echo "cores=16" >> $GITHUB_OUTPUT
          elif [ "${{ needs.probe-8.result }}" == "success" ]; then
            echo "runner=ubuntu-latest-8-cores" >> $GITHUB_OUTPUT
            echo "cores=8" >> $GITHUB_OUTPUT
          elif [ "${{ needs.probe-4.result }}" == "success" ]; then
            echo "runner=ubuntu-latest-4-cores" >> $GITHUB_OUTPUT
            echo "cores=4" >> $GITHUB_OUTPUT
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "cores=2" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # 第二阶段：在探测到的最高性能机器上打印系统信息
  # ==========================================
  test-runner:
    needs: determine-runner
    runs-on: ${{ needs.determine-runner.outputs.runner }}
    timeout-minutes: 10

    steps:
      - name: Print Test Result
        run: |
          echo "========================================"
          echo "✅ 测试成功！你的公开仓库最高可白嫖的配置为:"
          echo "👉 运行器: ${{ needs.determine-runner.outputs.runner }}"
          echo "👉 期望核心数: ${{ needs.determine-runner.outputs.cores }}"
          echo "========================================"
          echo ""
          echo "开始验证真实机器物理性能..."
          echo "--- CPU 核心数 ---"
          nproc
          echo ""
          echo "--- 内存使用情况 ---"
          free -h
          echo ""
          echo "--- 磁盘空间 ---"
          df -h /
          echo "========================================"
